<svg width="640" height="640" viewBox="0 0 640 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Lumi robot logo</title>
  <desc id="desc">A stylized glowing robot emblem for Lumi.</desc>
  <defs>
    <linearGradient id="bg" x1="96" y1="72" x2="544" y2="568" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0C1820"/>
      <stop offset="1" stop-color="#091117"/>
    </linearGradient>
    <linearGradient id="stroke" x1="180" y1="132" x2="468" y2="500" gradientUnits="userSpaceOnUse">
      <stop stop-color="#D8FFF1"/>
      <stop offset="0.48" stop-color="#7CF3D0"/>
      <stop offset="1" stop-color="#35C9B2"/>
    </linearGradient>
    <linearGradient id="accent" x1="206" y1="228" x2="434" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#A9FFF6"/>
      <stop offset="1" stop-color="#69E7FF"/>
    </linearGradient>
    <filter id="glow" x="60" y="52" width="520" height="536" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feFlood flood-opacity="0" result="BackgroundImageFix"/>
      <feBlend mode="normal" in="SourceGraphic" in2="BackgroundImageFix" result="shape"/>
      <feGaussianBlur stdDeviation="18" result="effect1_foregroundBlur"/>
    </filter>
  </defs>

  <rect x="88" y="88" width="464" height="464" rx="132" fill="url(#bg)"/>
  <rect x="88" y="88" width="464" height="464" rx="132" stroke="#19313A" stroke-width="8"/>

  <g filter="url(#glow)">
    <path d="M320 114V176" stroke="url(#stroke)" stroke-width="24" stroke-linecap="round"/>
    <circle cx="320" cy="96" r="18" fill="url(#accent)"/>

    <rect x="174" y="188" width="292" height="228" rx="76" stroke="url(#stroke)" stroke-width="24"/>
    <path d="M214 236H426" stroke="#183238" stroke-width="10" stroke-linecap="round"/>

    <rect x="206" y="256" width="86" height="70" rx="28" fill="#D7FFF5" fill-opacity="0.12" stroke="url(#accent)" stroke-width="14"/>
    <rect x="348" y="256" width="86" height="70" rx="28" fill="#D7FFF5" fill-opacity="0.12" stroke="url(#accent)" stroke-width="14"/>

    <path d="M244 372C262 404 292 420 320 420C348 420 378 404 396 372" stroke="url(#accent)" stroke-width="18" stroke-linecap="round"/>

    <path d="M174 290H132" stroke="url(#stroke)" stroke-width="22" stroke-linecap="round"/>
    <path d="M508 290H466" stroke="url(#stroke)" stroke-width="22" stroke-linecap="round"/>
    <path d="M214 438L188 484" stroke="url(#stroke)" stroke-width="22" stroke-linecap="round"/>
    <path d="M426 438L452 484" stroke="url(#stroke)" stroke-width="22" stroke-linecap="round"/>
  </g>

  <circle cx="148" cy="170" r="10" fill="#7CF3D0" fill-opacity="0.6"/>
  <circle cx="492" cy="476" r="12" fill="#69E7FF" fill-opacity="0.55"/>
  <circle cx="478" cy="164" r="8" fill="#D8FFF1" fill-opacity="0.55"/>
</svg>
